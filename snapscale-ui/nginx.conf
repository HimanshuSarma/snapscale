server {
    listen 80;
    
    # CRITICAL: This tells Nginx how to identify .js and .css files
    include /etc/nginx/mime.types;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This handles the React Router logic
        try_files $uri $uri/ /index.html;
    }

    # Optional: Help the browser cache static assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public";
    }
}