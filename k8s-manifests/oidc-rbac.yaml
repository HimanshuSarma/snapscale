apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # This is a default built-in role in K8s 1.20+ 
  # designed specifically for OIDC discovery
  name: system:service-account-issuer-discovery
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  # This allows the discovery endpoints to be 
  # read without an authentication token
  name: system:unauthenticated